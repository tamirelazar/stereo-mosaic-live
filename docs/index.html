<body>
<main>

    <h1>stereo-mosaic-live</h1>
    <p class="tagline">[… one-line framing — Tamir ]</p>

    <div class="controls" id="hero-controls">

      <label class="dial">viewpoint

      <label class="toggle"><input class="slices" type="checkbox"> show slices</label>
    </div>
    <p class="caption">[… caption: what "show slices" reveals — Tamir ]</p>
