<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>stereo-mosaic-live</title>
<meta name="description" content="One sideways pan in. A panorama whose viewpoint you choose afterward.">
<link rel="preload" href="./fonts/space-grotesk-700.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="./fonts/ibm-plex-mono-400.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<section class="hero">
  <div class="glow"></div>
  <div class="stage"><canvas id="hero-canvas"></canvas></div>
  <div class="scrim"></div>
  <div class="head">
    <div>
      <h1 class="wordmark">stereo<i>·</i>mosaic<i>·</i>live</h1>
      <p class="tag">One sideways pan in. A panorama whose viewpoint you choose afterward.</p>
    </div>
    <div class="meta"><b>215</b> frames<br><b>3982×527</b> panorama<br>WebGL2 · live</div>
  </div>
  <div class="console" id="hero-controls">
    <div class="cell"><span class="cap">Sampling mode</span>
      <div class="modes">
        <button data-m="pushbroom">pushbroom</button>
        <button data-m="xslit" class="on">xslit</button>
        <button data-m="forward">forward</button>
      </div></div>
    <div class="cell dial"><span class="cap">Viewpoint</span>
      <div class="dialrow"><input class="vp" type="range" min="0" max="1" step="0.005" value="0.5" aria-label="Viewpoint"><span class="val">0.50</span></div></div>
    <div class="cell"><span class="cap">Seams</span>
      <label class="toggle"><input class="slices" type="checkbox"> show slices</label></div>
    <div class="cell"><span class="cap">Output</span>
      <span class="live"><span class="dot"></span>re-resampled on input</span></div>
  </div>
  <a class="scrollhint" id="scrollhint" href="#explainer" aria-label="Scroll for more">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
  </a>
</section>
<!-- sections added in Task 5 -->
<script type="module" src="./js/page.js"></script>
</body>
</html>
